<!DOCTYPE html>
<html>
<head>
    <title>شفق - لوحة التحكم</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; background: #1e1e2f; color: #fff; margin: 0; padding: 20px; }
        .card { background: #2a2a3a; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .stat { font-size: 2em; font-weight: bold; color: #ffb347; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #444; }
        th { color: #ffb347; }
    </style>
</head>
<body>
    <h1>🌅 بوت شفق - الإحصائيات</h1>
    <div class="card">
        <div>📊 المجموعات النشطة</div>
        <div class="stat">{{ chats }}</div>
    </div>
    <div class="card">
        <div>👥 المستخدمين</div>
        <div class="stat">{{ users }}</div>
    </div>
    <div class="card">
        <div>🔒 أقفال نشطة</div>
        <div class="stat">{{ active_locks }} / {{ total_locks }}</div>
    </div>
    <div class="card">
        <h3>📋 آخر الأحداث</h3>
        <table>
            <tr><th>الإجراء</th><th>التاريخ</th></tr>
            {% for e in events %}
            <tr><td>{{ e.action }}</td><td>{{ e.created_at[:16] }}</td></tr>
            {% endfor %}
        </table>
    </div>
    <footer>بواسطة @Me8dad</footer>
</body>
</html>
